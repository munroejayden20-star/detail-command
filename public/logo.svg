<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Detail Command logo">
  <defs>
    <linearGradient id="dc-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#579dff"/>
      <stop offset="55%" stop-color="#2f7bff"/>
      <stop offset="100%" stop-color="#1649d6"/>
    </linearGradient>
    <linearGradient id="dc-shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.55"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#dc-grad)"/>
  <!-- Subtle highlight band -->
  <path d="M0 14 L64 0 L64 22 L0 36 Z" fill="#ffffff" opacity="0.07"/>
  <!-- Sparkle / shine mark: 4-pointed star -->
  <path
    d="M32 14
       C 33 22, 34 23, 42 25
       C 34 27, 33 28, 32 36
       C 31 28, 30 27, 22 25
       C 30 23, 31 22, 32 14 Z"
    fill="url(#dc-shine)"
  />
  <!-- Smaller accent sparkle -->
  <path
    d="M46 38
       C 46.5 41, 47 41.5, 50 42
       C 47 42.5, 46.5 43, 46 46
       C 45.5 43, 45 42.5, 42 42
       C 45 41.5, 45.5 41, 46 38 Z"
    fill="#ffffff" opacity="0.85"
  />
  <!-- Checkmark — nods to the calendar/checklist side -->
  <path
    d="M19 46 L26 52 L40 38"
    fill="none" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"
    opacity="0.95"
  />
</svg>
