<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Iris">
  <defs>
    <radialGradient id="iris-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#dc2626" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7f1d1d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="iris-core" cx="38%" cy="36%" r="68%">
      <stop offset="0%" stop-color="#fecaca"/>
      <stop offset="22%" stop-color="#f87171"/>
      <stop offset="55%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#450a0a"/>
    </radialGradient>
    <radialGradient id="iris-shine" cx="35%" cy="30%" r="22%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="iris-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
  </defs>

  <!-- Tile -->
  <rect width="64" height="64" rx="14" fill="url(#iris-bg)"/>

  <!-- Outer halo -->
  <circle cx="32" cy="32" r="28" fill="url(#iris-halo)"/>

  <!-- Orbital ring (faint) -->
  <ellipse cx="32" cy="32" rx="24" ry="9" fill="none"
           stroke="#dc2626" stroke-opacity="0.45" stroke-width="0.7"
           transform="rotate(-22 32 32)"/>
  <ellipse cx="32" cy="32" rx="22" ry="7" fill="none"
           stroke="#f87171" stroke-opacity="0.3" stroke-width="0.5"
           transform="rotate(28 32 32)"/>

  <!-- Core sphere -->
  <circle cx="32" cy="32" r="14" fill="url(#iris-core)"/>

  <!-- Specular highlight -->
  <circle cx="27" cy="27" r="6" fill="url(#iris-shine)"/>

  <!-- Tiny orbit particles -->
  <circle cx="55" cy="29" r="0.9" fill="#fca5a5" opacity="0.95"/>
  <circle cx="10" cy="36" r="0.7" fill="#f87171" opacity="0.8"/>
  <circle cx="46" cy="14" r="0.6" fill="#fecaca" opacity="0.7"/>
</svg>
